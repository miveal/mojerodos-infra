name: _terraform

# Reusable: fmt/init/validate + plan or apply for a single root module (leaf).
# Called by aws.yml (and any future per-provider caller). Never runs on its own.
on:
  workflow_call:
    inputs:
      working_directory:
        description: Root module directory to run in (e.g. aws/billing).
        required: true
        type: string
      apply:
        description: Apply instead of plan.
        required: false
        type: boolean
        default: false
      environment:
        description: GitHub Environment to gate the run (e.g. prod). Empty = no gate.
        required: false
        type: string
        default: ""
    secrets:
      cloudflare_api_token:
        description: Cloudflare API token, exposed as TF_VAR_cloudflare_api_token. Only the cloudflare/ leaves need it; AWS callers omit it.
        required: false

permissions:
  contents: read
  id-token: write # request the OIDC token

env:
  AWS_REGION: eu-central-1 # STS/default region only; each provider sets its own region
  TF_VERSION: "1.10.5"

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    # Cloudflare provider auth. Empty for AWS leaves (they don't init the CF provider),
    # set for cloudflare/ leaves. AWS creds for the S3 backend come via OIDC below.
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.cloudflare_api_token }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init -input=false

      - name: Validate
        run: terraform validate

      - name: Plan
        if: ${{ !inputs.apply }}
        run: terraform plan -input=false -no-color

      - name: Apply
        if: ${{ inputs.apply }}
        run: terraform apply -input=false -auto-approve
