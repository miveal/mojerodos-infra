name: _terraform

# Reusable: fmt/init/validate + plan or apply for a single root module (leaf).
# Called by aws.yml (and any future per-provider caller). Never runs on its own.
on:
  workflow_call:
    inputs:
      working_directory:
        description: Root module directory to run in (e.g. aws/billing).
        required: true
        type: string
      apply:
        description: Apply instead of plan.
        required: false
        type: boolean
        default: false
      environment:
        description: GitHub Environment to gate the run (e.g. prod). Empty = no gate.
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write # request the OIDC token

env:
  AWS_REGION: eu-central-1 # STS/default region only; each provider sets its own region
  TF_VERSION: "1.10.5"

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init -input=false

      - name: Validate
        run: terraform validate

      - name: Plan
        if: ${{ !inputs.apply }}
        run: terraform plan -input=false -no-color

      - name: Apply
        if: ${{ inputs.apply }}
        run: terraform apply -input=false -auto-approve
